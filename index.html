<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADL Business Consulting | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #2c5e8c;
            --pure-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--pure-white); /* Match logo background exactly */
        }

        .circuit-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg stroke='%23cbd5e1' stroke-width='0.4' stroke-opacity='0.3'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6zM36 4V0h-2v4h-4v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
        }

        .main-content {
            background: var(--pure-white);
            padding: 80px 40px;
            max-width: 900px;
            width: 95%;
            text-align: center;
            /* Using a very soft shadow rather than a border to create the "card" feel */
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.05);
            border-radius: 30px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            max-width: 650px; /* Significantly increased logo size */
            width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        .branding-divider {
            height: 4px;
            width: 350px; /* Slightly wider for the larger logo */
            background: linear-gradient(90deg, transparent, var(--brand-primary), transparent);
            margin: 30px auto 45px auto;
            border-radius: 4px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: #1e293b;
            letter-spacing: -0.02em;
            margin-bottom: 15px;
        }

        .message {
            font-size: 1.25rem;
            color: #64748b;
            line-height: 1.6;
            max-width: 650px;
            margin: 0 auto;
        }

        footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .main-content { padding: 40px 20px; }
            h1 { font-size: 1.6rem; }
            .logo-img { max-width: 100%; }
            .branding-divider { width: 220px; }
        }
    </style>
</head>
<body>
    <div class="circuit-overlay"></div>

    <div class="main-content">
        <img src="logo.jpg" alt="ADL Business Consulting" class="logo-img">
        
        <div class="branding-divider"></div>

        <h1>Excellence in Strategy. Coming Soon.</h1>
        <p class="message">Connecting Strategic Vision with Precision Solutions.<br>Our new digital platform is currently under construction.</p>
    </div>

    <footer>
        &copy; <span id="year"></span> ADL Business Consulting | Professional Strategy
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
