<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADL Business Consulting | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #2c5e8c;
            /* This hex code matches the soft gray background in the provided logo image */
            --bg-gray: #f2f4f7; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-gray);
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Subtle circuitry pattern that blends into the gray */
        .circuit-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg stroke='%23d1d9e0' stroke-width='0.5' stroke-opacity='0.4'%3E%3Cpath d='M40 40c0-8.837 7.163-16 16-16s16 7.163 16 16-7.163 16-16 16-16-7.163-16-16zM0 40c0-8.837 7.163-16 16-16s16 7.163 16 16-7.163 16-16 16S0 48.837 0 40z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
            opacity: 0.5;
        }

        .main-content {
            text-align: center;
            max-width: 900px;
            width: 95%;
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .logo-img {
            max-width: 700px; /* Further increased size for impact */
            width: 100%;
            height: auto;
            /* No shadows or borders to ensure the logo edges disappear into the page background */
            display: block;
            margin: 0 auto;
        }

        .branding-divider {
            height: 4px;
            width: 350px;
            background: linear-gradient(90deg, transparent, var(--brand-primary), transparent);
            margin: 10px auto 40px auto;
            border-radius: 4px;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: #1e293b;
            letter-spacing: -0.02em;
            margin-bottom: 15px;
        }

        .message {
            font-size: 1.25rem;
            color: #475569;
            line-height: 1.6;
            max-width: 650px;
            margin: 0 auto;
        }

        footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .logo-img { max-width: 100%; }
            .branding-divider { width: 200px; }
        }
    </style>
</head>
<body>
    <div class="circuit-overlay"></div>

    <div class="main-content">
        <!-- Ensure your file is named logo.jpg on GitHub -->
        <img src="logo.jpg" alt="ADL Business Consulting" class="logo-img">
        
        <div class="branding-divider"></div>

        <h1>Excellence in Strategy. Coming Soon.</h1>
        <p class="message">Connecting Strategic Vision with Precision Solutions.<br>Our new digital platform is currently under construction.</p>
    </div>

    <footer>
        &copy; <span id="year"></span> ADL Business Consulting | Professional Strategy
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
