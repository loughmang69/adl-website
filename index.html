<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADL Business Consulting | Coming Soon</title>
    <style>
        :root {
            --brand-blue: #2c5e8c;
            --brand-light-blue: #e8f1f8;
            --text-dark: #1a2b3c;
            --text-muted: #5a6b7d;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            /* Subtle circuitry pattern background to match logo */
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg stroke='%23dce4eb' stroke-width='1'%3E%3Cpath d='M40 40c0-8.837 7.163-16 16-16s16 7.163 16 16-7.163 16-16 16-16-7.163-16-16zM0 40c0-8.837 7.163-16 16-16s16 7.163 16 16-7.163 16-16 16S0 48.837 0 40z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-img {
            max-width: 400px;
            width: 100%;
            height: auto;
        }

        .accent-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--brand-blue), transparent);
            margin: 25px 0;
            opacity: 0.3;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .cta-box {
            max-width: 500px;
            margin: 0 auto;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="email"] {
            flex: 1;
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus {
            border-color: var(--brand-blue);
        }

        button {
            background-color: var(--brand-blue);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #1e4569;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(44, 94, 140, 0.3);
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            h1 { font-size: 1.5rem; }
            .logo-img { max-width: 300px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-container">
            <!-- Ensure your uploaded logo is named logo.jpg -->
            <img src="logo.jpg" alt="ADL Business Consulting Logo" class="logo-img">
        </div>

        <div class="accent-line"></div>

        <h1>Our Full Digital Platform is Coming Soon.</h1>
        <p>Connecting Strategic Vision with Precision Solutions.</p>

        <div class="cta-box">
            <form action="#" onsubmit="alert('Thank you. You have been added to our early access list.'); return false;">
                <div class="input-group">
                    <input type="email" placeholder="Enter your business email address" required>
                    <button type="submit">Notify Me</button>
                </div>
            </form>
            <p style="font-size: 0.9rem; margin-top: 10px;">Stay informed. Sign up to receive an exclusive early access invitation.</p>
        </div>
    </div>

    <footer>
        &copy; 2024 ADL Business Consulting. All rights reserved. | Powered by GitHub Pages
    </footer>

</body>
</html>
