<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADL Business Consulting | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #ffffff; /* Pure white to match logo background */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Circuitry-style background decoration */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10L90 90M90 10L10 90' stroke='%23f0f4f8' stroke-width='0.5'/%3E%3Ccircle cx='50' cy='50' r='2' fill='%23e2e8f0'/%3E%3C/svg%3E");
            opacity: 0.6;
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 90%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            margin-bottom: 20px;
        }

        .logo-img {
            max-width: 100%;
            height: auto;
            width: 550px; /* Sizing it specifically for impact */
        }

        .hero-line {
            height: 4px;
            width: 100%;
            background: linear-gradient(90deg, #ffffff 0%, #2c5e8c 50%, #ffffff 100%);
            margin: 30px 0;
            border-radius: 2px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            color: #1a2b3c;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        p.sub-heading {
            font-size: 1.2rem;
            color: #4a5568;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .form-group {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        input[type="email"] {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="email"]:focus {
            border-color: #2c5e8c;
            box-shadow: 0 0 0 3px rgba(44, 94, 140, 0.1);
        }

        button {
            padding: 15px 30px;
            background-color: #2c5e8c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #1e3f5f;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(44, 94, 140, 0.2);
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: #a0aec0;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .form-group { flex-direction: column; }
            h1 { font-size: 1.5rem; }
            .logo-img { width: 350px; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.jpg" alt="ADL Business Consulting" class="logo-img">
        </div>

        <div class="hero-line"></div>

        <h1>Our Full Digital Platform is Coming Soon</h1>
        <p class="sub-heading">Connecting Strategic Vision with Precision Solutions.</p>

        <form class="form-group" action="#" onsubmit="alert('You have been added to our notification list.'); return false;">
            <input type="email" placeholder="Business email address" required>
            <button type="submit">Notify Me</button>
        </form>
    </div>

    <footer>
        &copy; 2024 ADL BUSINESS CONSULTING. ALL RIGHTS RESERVED.
    </footer>
</body>
</html>
